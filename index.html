<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚡ MATA YANG BERKEDIP ⚡</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 30%, #0a0a0a, #000000);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', Courier, monospace;
      margin: 0;
      padding: 16px;
      transition: background 0.2s, filter 0.1s;
    }

    /* glitch layer palsu — muncul kalau gagal / aneh */
    .glitch-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(0deg, rgba(255,0,180,0.2) 0px, rgba(0,255,255,0.2) 2px, transparent 4px);
      mix-blend-mode: screen;
      z-index: 9998;
      animation: glitchMe 0.2s infinite;
      display: none;
    }

    .glitch-overlay.active {
      display: block;
    }

    @keyframes glitchMe {
      0% { transform: translate(2px, -1px); opacity: 0.8; }
      20% { transform: translate(-3px, 2px); opacity: 0.4; background: #ff00ff30; }
      40% { transform: translate(5px, -3px); background: #00ffff40; }
      60% { transform: translate(-5px, 4px); background: #ff880070; }
      80% { transform: translate(2px, -4px); }
      100% { transform: translate(0); }
    }

    /* layar kembang api putih (senang) */
    .confetti-white {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      width: 8px; height: 8px;
      background: white;
      opacity: 0.9;
      animation: fall 3s linear infinite;
      filter: blur(1px) drop-shadow(0 0 6px white);
      border-radius: 2px;
    }

    @keyframes fall {
      0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(120vh) rotate(720deg); opacity: 0; }
    }

    /* KOTAK UTAMA – EYE CORE */
    .eye-container {
      max-width: 680px;
      width: 100%;
      background: rgba(10, 10, 15, 0.8);
      backdrop-filter: blur(4px);
      border: 3px solid #3a1f2f;
      box-shadow: 0 0 40px #ff00c150, inset 0 0 20px #3f1e2e;
      padding: 30px 20px 40px;
      border-radius: 60px 60px 80px 80px;
      transition: border-color 0.2s, box-shadow 0.3s;
      text-align: center;
    }

    /* mata */
    .eye {
      width: 200px;
      height: 200px;
      margin: 0 auto 30px;
      background: #111;
      border-radius: 50%;
      box-shadow: 0 0 0 6px #3a1a2a, 0 0 0 12px #220e16, 0 0 50px #ff3377;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow 0.2s, transform 0.1s;
      cursor: pointer;
    }

    .pupil {
      width: 90px;
      height: 90px;
      background: radial-gradient(circle at 30% 40%, #fee, #a00 80%);
      border-radius: 50%;
      box-shadow: 0 0 30px #ff8888;
      transition: all 0.1s ease;
    }

    /* kedip */
    .eye.blink .pupil {
      transform: scaleY(0.1) translateY(20px);
      background: #710000;
      box-shadow: 0 0 60px #ff3300;
    }

    /* marah */
    .eye.angry {
      animation: shake 0.1s infinite;
    }
    .eye.angry .pupil {
      background: #ff2200;
      box-shadow: 0 0 70px red;
      width: 70px; height: 70px;
      border-radius: 20% 50% 20% 50%;
    }

    /* senang */
    .eye.happy .pupil {
      background: radial-gradient(circle at 60% 40%, #ffffc0, #ffcc99);
      width: 110px; height: 110px;
      border-radius: 40% 40% 20% 20%;
    }

    @keyframes shake {
      0% { transform: translate(2px, -2px); }
      20% { transform: translate(-3px, 3px); }
      40% { transform: translate(4px, -3px); }
      60% { transform: translate(-3px, 4px); }
      80% { transform: translate(2px, -3px); }
      100% { transform: translate(0); }
    }

    /* kotak bicara */
    .speech-bubble {
      background: #1e1219;
      border: 3px solid #b33f6f;
      border-radius: 30px 30px 30px 10px;
      padding: 24px 28px;
      margin: 30px 16px 20px;
      box-shadow: 0 0 30px #ff338850;
      color: #f7d2e0;
      font-size: 1.5rem;
      font-weight: bold;
      min-height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      word-break: break-word;
      text-shadow: 0 0 5px magenta;
      position: relative;
    }

    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -20px; left: 40px;
      width: 0; height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 30px solid #b33f6f;
      filter: drop-shadow(0 6px 6px #200);
    }

    .type-cursor {
      display: inline-block;
      width: 10px;
      height: 2.2rem;
      background: #ff80bf;
      vertical-align: middle;
      margin-left: 8px;
      animation: blinkCursor 0.9s infinite;
    }

    @keyframes blinkCursor {
      0%, 100% { opacity: 1; } 50% { opacity: 0; }
    }

    /* area mini game */
    .game-area {
      background: #0f070b;
      border: 2px dashed #aa4e76;
      padding: 24px 12px;
      border-radius: 50px;
      margin: 30px 0 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 18px;
    }

    .game-btn {
      background: #28161e;
      border: 3px solid #b34b77;
      color: #ffb6d1;
      font-size: 2rem;
      font-weight: 800;
      padding: 18px 32px;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.1s;
      box-shadow: 0 0 20px #ff3399;
      font-family: inherit;
      text-transform: uppercase;
    }

    .game-btn:hover {
      background: #4f253a;
      transform: scale(1.07);
      border-color: white;
      color: white;
    }

    .game-btn.special {
      background: black;
      color: #aaa;
      border-color: #444;
      box-shadow: none;
    }

    .counter-text {
      color: #af7f97;
      font-size: 1.2rem;
      letter-spacing: 4px;
    }

    .reset-tip {
      margin-top: 24px;
      color: #633b4c;
      border-top: 2px solid #411f2e;
      padding-top: 20px;
      font-size: 0.95rem;
    }

    button.weird-button {
      background: #1c0c13;
      border: 3px solid #603f50;
      color: #d0a0b8;
      padding: 14px 25px;
      border-radius: 50px;
      font-size: 1.4rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 0 15px cyan;
    }

    button.weird-button:hover {
      background: #2e1522;
      color: white;
      border-color: white;
    }
  </style>
</head>
<body>

<div class="glitch-overlay" id="glitchOverlay"></div>
<div id="confettiContainer" class="confetti-white" style="display: none;"></div>

<div class="eye-container" id="mainCard">
  <!-- MATA BERKEDIP (diklik atau otomatis) -->
  <div class="eye" id="eyeElement">
    <div class="pupil" id="pupil"></div>
  </div>

  <!-- AREA BICARA + ANIMASI KETIK -->
  <div class="speech-bubble" id="speechBubble">
    <span id="typingText"></span>
    <span class="type-cursor"></span>
  </div>

  <!-- MINI GAME SEDERHANA: TEBAK ANGKA 1-3 -->
  <div class="game-area">
    <div class="counter-text" id="gameMessage">✨ tebak aku ✨</div>
    <div style="display: flex; gap: 18px; flex-wrap: wrap; justify-content: center;">
      <button class="game-btn" data-guess="1">1</button>
      <button class="game-btn" data-guess="2">2</button>
      <button class="game-btn" data-guess="3">3</button>
    </div>
    <div style="margin-top: 12px;">
      <button class="game-btn special" id="weirdStopBtn">⁉️ ??? ⁉️</button>
    </div>
  </div>

  <!-- TOMBOL ANEH (untuk menghentikan kegilaan) -->
  <div class="reset-tip">
    <button class="weird-button" id="resetWeirdButton">[   ⊙   .   ⊙   ]</button>
    <p style="margin-top: 12px;">tekan jika dunia error...</p>
  </div>
</div>

<script>
  (function() {
    // ---------- elemen
    const eye = document.getElementById('eyeElement');
    const pupil = document.getElementById('pupil');
    const speechSpan = document.getElementById('typingText');
    const gameMsgDiv = document.getElementById('gameMessage');
    const glitchLayer = document.getElementById('glitchOverlay');
    const confettiDiv = document.getElementById('confettiContainer');
    const weirdStop = document.getElementById('resetWeirdButton');
    const stopGlitchBtn = document.getElementById('weirdStopBtn'); // tombol aneh di game area

    // state
    let currentText = "";
    let textIndex = 0;
    let isTyping = false;
    let blinkInterval = null;
    let glitchActive = false;
    let happyMode = false;
    let angryMode = false;
    let gameCount = 0;           // semakin lama main
    let gameSuccess = false;      // berhasil baru saja
    let weirdTriggered = false;   // apakah sudah masuk mode aneh

    // kumpulan kalimat mengerikan (semakin aneh)
    const normalLines = [
      "AKU MELIHATmu...",
      "tebak angka 1-3...",
      "jangan salah...",
      "lebih lama lebih aneh...",
      "kedip⚡kedip⚡",
      "coba lagi..."
    ];

    const weirdLines = [
      "KAMU TIDAK ADA...",
      "ERROR 0x7A 🌸",
      "666 ⚡ 999",
      "‎‎ᚻᛖᛚᛚᚩ...ᚠᚱᛁᛖᚾᛞ",
      "angka jadi huruf?",
      "MATA‎‎ DI‎‎ LANGIT‎‎",
      "‎(｡•̀ᴗ-)✧‎‎‎ G‎L‎I‎T‎C‎H",
      "tekan tombol aneh..."
    ];

    // === fungsi pengetikan
    function typeLine(newText, speed = 70) {
      if (isTyping) return;
      isTyping = true;
      currentText = newText;
      textIndex = 0;
      speechSpan.textContent = '';

      function addChar() {
        if (textIndex < currentText.length) {
          speechSpan.textContent += currentText.charAt(textIndex);
          textIndex++;
          setTimeout(addChar, speed);
        } else {
          isTyping = false;
        }
      }
      addChar();
    }

    // === ekspresi mata
    function setExpression(exp) {
      eye.classList.remove('angry', 'happy', 'blink');
      if (exp === 'angry') eye.classList.add('angry');
      else if (exp === 'happy') eye.classList.add('happy');
      else if (exp === 'blink') eye.classList.add('blink');
    }

    // === kedip otomatis setiap 4 detik
    function startBlink() {
      if (blinkInterval) clearInterval(blinkInterval);
      blinkInterval = setInterval(() => {
        if (!angryMode && !happyMode && !glitchActive) {
          setExpression('blink');
          setTimeout(() => setExpression('normal'), 200);
        }
      }, 4000);
    }

    // === glitch parah
    function activateGlitch(level = 'parah') {
      glitchLayer.classList.add('active');
      glitchActive = true;
      document.body.style.background = '#000000';
      document.body.style.filter = 'hue-rotate(90deg) contrast(2)';
      setExpression('angry');
      angryMode = true; happyMode = false;

      // Error palsu random
      typeLine('!!! SISTEM GAGAL !!!', 40);
      gameMsgDiv.innerHTML = 'ERR#@!ᚹᚨᚱᚾᛁᛜ';

      // tambah glitch parah berkala
      if (window.glitchInterval) clearInterval(window.glitchInterval);
      window.glitchInterval = setInterval(() => {
        if (!glitchActive) return;
        document.body.style.transform = `translate(${Math.sin(Date.now())*2}px, ${Math.cos(Date.now()*2)*2}px)`;
        eye.style.boxShadow = `0 0 ${50+Math.random()*100}px #ff00ff`;
      }, 50);
    }

    function deactivateGlitch() {
      glitchLayer.classList.remove('active');
      glitchActive = false;
      angryMode = false;
      document.body.style.background = '';
      document.body.style.filter = '';
      document.body.style.transform = '';
      if (window.glitchInterval) clearInterval(window.glitchInterval);
      setExpression('normal');
    }

    // === kembang api putih (senang)
    function startParty() {
      confettiDiv.style.display = 'block';
      for (let i=0; i<110; i++) {
        let piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.animationDelay = Math.random() * 3 + 's';
        piece.style.width = (4 + Math.random()*10) + 'px';
        piece.style.height = (4 + Math.random()*10) + 'px';
        piece.style.background = `rgba(255,255,255,${0.5+Math.random()*0.5})`;
        confettiDiv.appendChild(piece);
      }
      setTimeout(() => {
        confettiDiv.style.display = 'none';
        confettiDiv.innerHTML = '';
      }, 4500);
    }

    // === logika game tebak (gagal / berhasil)
    function handleGame(guess) {
      if (glitchActive && !weirdTriggered) {
        typeLine('TIDAK ADA YANG BISA TEBAK!', 60);
        return;
      }

      // tambah counter kelamaan main
      gameCount++;

      // logika makin aneh setelah 5 kali main
      let secretNumber = Math.floor(Math.random() * 3) + 1; // 1-3

      // jika sudah lebih dari 5 x main, aneh: target berubah ubah / ilusi
      if (gameCount > 5 && !happyMode) {
        // masuk fase aneh: tebakan benar/salah jadi random absurd
        if (Math.random() > 0.3) {
          secretNumber = (guess % 3) + 1;  // kadang selalu salah
        } else {
          secretNumber = guess; // kadang selalu benar (tapi teks error)
        }
        // layar mulai glitch tipis
        glitchLayer.classList.add('active');
        document.body.style.filter = 'hue-rotate(30deg)';
      }

      if (guess === secretNumber) {
        // BERHASIL!!
        gameSuccess = true;
        deactivateGlitch();   // matikan error
        setExpression('happy');
        happyMode = true; angryMode = false;
        typeLine('✨ SELAMAT! ✨ KAU MENANG! MATA BERSINAR!', 60);
        gameMsgDiv.innerHTML = '♡ BERHASIL ♡';
        startParty();
        // setelah senang, reset perlahan
        setTimeout(() => {
          if (!glitchActive) {
            setExpression('normal');
            happyMode = false;
            typeLine('main lagi...', 60);
          }
        }, 4000);
      } else {
        // GAGAL → marah + glitch
        gameSuccess = false;
        setExpression('angry');
        angryMode = true; happyMode = false;
        typeLine('SALAH! AKU MARAH! 🌋', 50);
        gameMsgDiv.innerHTML = '✘ GAGAL ✘';

        // jika gagal dan gameCount > 8 → glitch super
        if (gameCount > 8 || weirdTriggered) {
          activateGlitch();
          typeLine('🚨 ERROR PALSU 🚨 sistem aneh... tekan tombol ???', 40);
        } else {
          // marah biasa, efek merah
          eye.style.boxShadow = '0 0 100px red';
          setTimeout(() => eye.style.boxShadow = '', 400);
        }
      }
    }

    // reset sebagian (tombol aneh)
    function resetWeird() {
      deactivateGlitch();
      weirdTriggered = false;
      gameCount = 0;
      setExpression('normal');
      typeLine('...hening... MATA BERKEDIP', 60);
      gameMsgDiv.innerHTML = 'tebak lagi?';
      document.body.style.filter = '';
      document.body.style.background = '';
      glitchLayer.classList.remove('active');
    }

    // === event listeners
    document.querySelectorAll('[data-guess]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (happyMode) {
          typeLine('aku sedang senang... coba lagi nanti', 70);
          return;
        }
        const guess = parseInt(e.target.dataset.guess, 10);
        handleGame(guess);
      });
    });

    // Kedip jika mata diklik
    eye.addEventListener('click', () => {
      if (!angryMode && !happyMode) {
        setExpression('blink');
        setTimeout(() => setExpression('normal'), 200);
        typeLine('👁️‍🗨️ jangan sentuh...', 50);
      } else {
        typeLine('😠😠😠', 30);
      }
    });

    // tombol aneh (reset)
    weirdStop.addEventListener('click', () => {
      resetWeird();
      typeLine('aneh... berhenti...', 60);
    });

    stopGlitchBtn.addEventListener('click', () => {
      // tombol ??? di game area: kalau glitch aktif, matiin, kalau nggak, jadi weird trigger
      if (glitchActive) {
        resetWeird();
        typeLine('glitch berhenti...', 60);
      } else {
        // masuk mode weird: glitch ringan, teks aneh
        weirdTriggered = true;
        gameCount += 5;  // simulasi main lama
        activateGlitch();
        typeLine(weirdLines[Math.floor(Math.random() * weirdLines.length)], 40);
        gameMsgDiv.innerHTML = '???';
      }
    });

    // inisialisasi: type pertama + kedip
    typeLine('aku melihatmu... tebak angka 1-3', 70);
    startBlink();

    // interval makin aneh seiring waktu (jika tidak disentuh)
    let timeWeird = 0;
    setInterval(() => {
      if (!glitchActive && !happyMode && gameCount > 3) {
        // glitch halus
        glitchLayer.classList.add('active');
        setTimeout(() => { if(!glitchActive) glitchLayer.classList.remove('active'); }, 800);
        // type line aneh
        if (Math.random() > 0.6) {
          typeLine(weirdLines[Math.floor(Math.random() * weirdLines.length)], 50);
        }
      }
    }, 7000);
  })();
</script>
</body>
</html>
