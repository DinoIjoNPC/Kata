<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORD FINDER • 1 JUTA+ KATA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0b0f1c 0%, #1a1f33 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .card {
            max-width: 1000px;
            width: 100%;
            background: rgba(18, 22, 40, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(90, 150, 255, 0.2);
            border-radius: 3rem 3rem 2rem 2rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(70, 130, 255, 0.2) inset;
            padding: 2.2rem 2rem 2rem 2rem;
            transition: all 0.2s;
        }

        .glitch-title {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 8px #3b7fff, 0 0 20px #2a5fdc, 4px 4px 0 #0a0e1c;
            margin-bottom: 2rem;
            word-break: break-word;
            animation: titleFlicker 3s infinite alternate;
        }
        @keyframes titleFlicker {
            0% { text-shadow: 0 0 8px #3b7fff, 0 0 20px #2a5fdc, 4px 4px 0 #0a0e1c; }
            50% { text-shadow: 0 0 12px #6a9fff, 0 0 30px #3f6ef0, 4px 4px 0 #11162b; }
            100% { text-shadow: 0 0 8px #3b7fff, 0 0 20px #2a5fdc, 4px 4px 0 #0a0e1c; }
        }

        .search-section {
            background: rgba(10, 14, 27, 0.7);
            border-radius: 100px;
            padding: 0.5rem 0.5rem 0.5rem 2rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border: 1px solid #2c3766;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            margin-bottom: 2rem;
        }

        .search-section input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 1.5rem;
            font-weight: 400;
            color: #ffffff;
            padding: 0.8rem 0;
            min-width: 0;
        }
        .search-section input::placeholder {
            color: #6a75a4;
            font-weight: 300;
            letter-spacing: 0.5px;
            font-size: 1.3rem;
        }

        .search-btn {
            background: linear-gradient(135deg, #2e3f8a, #1c2b62);
            border: none;
            border-radius: 60px;
            padding: 0.9rem 2.5rem;
            font-size: 1.5rem;
            font-weight: 600;
            text-transform: uppercase;
            color: white;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0e1433, 0 8px 25px #00000080;
            transition: 0.1s ease;
            border: 1px solid #6183ff;
            white-space: nowrap;
        }
        .search-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #0e1433, 0 8px 25px #000;
        }

        .anim-container {
            background: #0e1328;
            border-radius: 80px;
            padding: 0.7rem 1.8rem;
            margin: 1rem 0 1.5rem 0;
            border-left: 6px solid #3e67d9;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: inset 0 2px 8px #00000060, 0 6px 14px #0000004d;
            min-height: 68px;
        }

        .searching-text {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(45deg, #b2cbff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .loader-dots {
            display: flex;
            gap: 8px;
        }
        .loader-dots span {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #5d8aff;
            box-shadow: 0 0 12px #3d7eff;
            animation: pulseLoader 1.4s infinite ease-in-out both;
        }
        .loader-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loader-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes pulseLoader {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 
            40% { transform: scale(1.2); opacity: 1; background: #9bb8ff; }
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: #040717b3;
            padding: 0.8rem 1.6rem;
            border-radius: 50px;
            margin-bottom: 1.5rem;
            border: 1px solid #2a3b79;
            color: white;
            flex-wrap: wrap;
            gap: 10px;
        }
        .total-badge {
            background: #1f2a54;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-size: 1.3rem;
            font-weight: 600;
            color: #c6ddff;
            box-shadow: inset 0 1px 4px #91a9ff4d;
        }
        .total-badge span {
            color: white;
            font-weight: 800;
            font-size: 2.2rem;
            margin-left: 10px;
            text-shadow: 0 0 10px #5695ff;
        }
        .dev-sign {
            font-size: 1.1rem;
            background: #0e162e;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            border: 1px dashed #5b7fff;
        }
        .dev-sign a {
            color: #aac3ff;
            text-decoration: none;
            font-weight: 500;
        }
        .dev-sign a:hover {
            text-decoration: underline;
            color: white;
        }

        .word-list {
            background: #030617b0;
            border-radius: 40px;
            padding: 1.5rem 1.8rem;
            border: 1px solid #43558f;
            backdrop-filter: blur(8px);
            max-height: 380px;
            overflow-y: auto;
            scroll-behavior: smooth;
            box-shadow: inset 0 0 30px #00000099, 0 16px 28px #0000006e;
        }

        .word-list ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .word-item {
            font-size: 1.35rem;
            padding: 0.7rem 1.2rem;
            border-bottom: 1px solid rgba(70, 120, 255, 0.15);
            color: #e2ecff;
            display: flex;
            align-items: center;
            transition: 0.2s;
            border-radius: 40px;
        }
        .word-item:hover {
            background: #18234b;
            border-bottom-color: transparent;
            transform: translateX(8px);
            box-shadow: -4px 4px 0 #4070dd;
        }
        .word-item strong {
            color: #ffdb7e;
            font-size: 1.8rem;
            font-weight: 800;
            min-width: 50px;
            display: inline-block;
            text-shadow: 0 2px 5px #a85f00;
        }
        .word-desc {
            margin-left: 0.8rem;
            word-break: break-word;
            color: #b7cbff;
        }

        .word-list::-webkit-scrollbar {
            width: 12px;
        }
        .word-list::-webkit-scrollbar-track {
            background: #0c1126;
            border-radius: 20px;
        }
        .word-list::-webkit-scrollbar-thumb {
            background: #334b99;
            border-radius: 20px;
            border: 2px solid #141d3a;
        }

        .info-footer {
            margin-top: 1.2rem;
            font-size: 0.95rem;
            text-align: center;
            color: #6a7fc2;
        }

        @media (max-width: 550px) {
            .glitch-title { font-size: 2.4rem; }
            .search-section { flex-wrap: wrap; background: transparent; padding: 0; gap: 0.8rem; }
            .search-section input { background: #0f1833; border-radius: 60px; padding: 1rem 1.5rem; }
            .search-btn { width: 100%; }
            .total-badge span { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="glitch-title">WORD FINDER</div>

        <div class="search-section">
            <input type="text" id="prefixInput" placeholder="Masukan awalan kata, contoh: A" autofocus>
            <button class="search-btn" id="searchBtn">🔍 Search</button>
        </div>

        <div id="animContainer" class="anim-container" style="justify-content: space-between;">
            <span class="searching-text" id="searchStatus">[SEARCHING...]</span>
            <div class="loader-dots" id="loaderDots">
                <span></span><span></span><span></span>
            </div>
        </div>

        <div class="stats">
            <div class="total-badge" id="totalCounter">
                Total Kata <span id="totalValue">0</span>
            </div>
            <div class="dev-sign">
                🛠️ Developer : <a href="#" target="_blank">@dinooodev</a>
            </div>
        </div>

        <div class="word-list" id="wordListContainer">
            <ul id="wordList">
                <li style="color: #6270a4; padding: 2rem; text-align: center; font-style: italic;">💫 generate database 1 JUTA+ kata...</li>
            </ul>
        </div>
        <div class="info-footer" id="footerInfo">⏤ total kata tersedia <strong id="totalDbIndicator">0</strong> entri · full kata sambung ⏤</div>
    </div>

    <script>
        (function() {
            console.log("🚀 Membangun database 1 JUTA+ kata...");
            
            // =====================================================
            // DATABASE JUTAAN KATA (1.000.000+)
            // =====================================================
            
            // Kumpulan morfem/imbuhan Indonesia biar kata terdengar natural
            const awalan = ["", "me", "pe", "ber", "ter", "ke", "se", "di", "per", "mem", "pen", "peng", "memper", "diper", "terper"];
            const akhiran = ["", "kan", "an", "i", "nya", "kah", "lah", "pun", "wan", "wati", "man", "da", "ta", "na"];
            const sisipan = ["", "el", "em", "er", "in"];
            
            // Kumpulan kata dasar (akar kata) yang umum dalam bahasa Indonesia
            const dasarKata = [
                "makan", "minum", "tidur", "jalan", "lari", "duduk", "baca", "tulis", "lihat", "dengar",
                "bicara", "pikir", "rasa", "buat", "kerja", "main", "beli", "jual", "buka", "tutup",
                "masuk", "keluar", "naik", "turun", "besar", "kecil", "panjang", "pendek", "baru", "lama",
                "baik", "buruk", "indah", "jelek", "manis", "pahit", "asam", "asin", "pedas", "dingin",
                "panas", "sejuk", "hangat", "terang", "gelap", "terang", "suram", "mudah", "sulit", "cepat",
                "lambat", "kuat", "lemah", "keras", "lunak", "tebal", "tipis", "berat", "ringan", "penuh",
                "kosong", "hidup", "mati", "bangun", "tidur", "datang", "pergi", "pulang", "antar", "jemput",
                "bawa", "angkat", "lempar", "tangkap", "pegang", "genggam", "dorong", "tarik", "tekan", "pukul",
                "tendang", "lempar", "panggil", "jawab", "tanya", "minta", "beri", "kasih", "bagi", "ambil",
                "simpan", "taruh", "letak", "tumpuk", "susun", "atur", "rapi", "bersih", "kotor", "basah",
                "kering", "air", "api", "tanah", "udara", "batu", "pasir", "besi", "kayu", "bambu",
                "rumah", "kamar", "dapur", "kantor", "sekolah", "kampus", "pasar", "toko", "warung", "rumah",
                "mobil", "motor", "sepeda", "kereta", "kapal", "pesawat", "bus", "becak", "delman", "gerobak",
                "kota", "desa", "kampung", "dusun", "negeri", "negara", "provinsi", "kabupaten", "kecamatan", "kelurahan",
                "orang", "manusia", "pria", "wanita", "anak", "bayi", "remaja", "dewasa", "tua", "muda",
                "ayah", "ibu", "kakak", "adik", "paman", "bibi", "kakek", "nenek", "cucu", "saudara",
                "teman", "sahabat", "musuh", "lawan", "kawan", "rekan", "mitra", "komplotan", "geng", "kelompok",
                "kepala", "rambut", "mata", "hidung", "mulut", "telinga", "pipi", "dahi", "alis", "bulu",
                "tangan", "kaki", "jari", "kuku", "siku", "lutut", "paha", "betis", "perut", "dada",
                "punggung", "leher", "bahu", "pinggang", "pinggul", "badan", "tubuh", "jasmani", "rohani", "jiwa",
                "hewan", "binatang", "kucing", "anjing", "ayam", "bebek", "kambing", "sapi", "kerbau", "kuda",
                "kelinci", "tikus", "ular", "burung", "ikan", "udang", "kepiting", "belalang", "kupu", "nyamuk",
                "lalat", "lebah", "tawon", "semut", "rayap", "kecoak", "cicak", "tokek", "bunglon", "buaya",
                "tumbuhan", "pohon", "rumput", "bunga", "daun", "buah", "biji", "akar", "batang", "dahan",
                "ranting", "cabang", "putik", "sari", "madu", "getah", "nira", "sagu", "tepung", "beras",
                "emas", "perak", "perunggu", "tembaga", "kuningan", "baja", "aluminium", "plastik", "kaca", "keramik",
                "merah", "putih", "hitam", "biru", "hijau", "kuning", "ungu", "jingga", "coklat", "abu",
                "senin", "selasa", "rabu", "kamis", "jumat", "sabtu", "minggu", "januari", "februari", "maret",
                "april", "mei", "juni", "juli", "agustus", "september", "oktober", "november", "desember", "tahun",
                "bulan", "pekan", "hari", "jam", "menit", "detik", "waktu", "masa", "zaman", "era",
                "satu", "dua", "tiga", "empat", "lima", "enam", "tujuh", "delapan", "sembilan", "sepuluh",
                "ratus", "ribu", "juta", "milyar", "triliun", "pertama", "kedua", "ketiga", "keempat", "kelima",
                "foto", "gambar", "lukis", "pahat", "ukir", "cetak", "tulis", "baca", "hitung", "jumlah",
                "tambah", "kurang", "kali", "bagi", "pangkat", "akar", "log", "sin", "cos", "tan"
            ];
            
            // Tambahan dasar kata untuk variasi
            const dasarTambahan = [];
            for (let i = 0; i < 2000; i++) {
                dasarTambahan.push(`kata${i}`, `dasar${i}`, `akar${i}`, `root${i}`, `base${i}`);
            }
            const semuaDasar = [...dasarKata, ...dasarTambahan];
            
            // Fungsi untuk menghasilkan kata acak dengan pola bahasa Indonesia
            function generateKataIndo(prefix, index) {
                // Pilih komponen secara acak
                const dasar = semuaDasar[Math.floor(Math.random() * semuaDasar.length)];
                const aw = awalan[Math.floor(Math.random() * awalan.length)];
                const akh = akhiran[Math.floor(Math.random() * akhiran.length)];
                const sis = sisipan[Math.floor(Math.random() * sisipan.length)];
                
                // Bangun kata
                let kata = aw + dasar + sis + akh;
                
                // Pastikan huruf pertama sesuai prefix
                kata = prefix + kata.slice(1);
                
                // Bersihkan dari spasi dan karakter aneh
                kata = kata.replace(/[^a-zA-Z]/g, '').toLowerCase();
                
                // Batasi panjang kata (biar gak kepanjangan)
                if (kata.length > 18) {
                    kata = kata.substring(0, 15);
                }
                
                return kata;
            }
            
            // === GENERASI MASSAL 1.000.000+ KATA ===
            const DATABASE = [];
            const hurufDepan = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
            
            // Target: minimal 1.200.000 kata
            const TARGET = 1200000;
            let counter = 0;
            
            console.log("⏳ Memulai generasi 1.2 juta kata...");
            
            // Loop per huruf untuk distribusi merata
            for (let h = 0; h < hurufDepan.length; h++) {
                const prefix = hurufDepan[h];
                // Setiap huruf mendapat porsi yang berbeda biar lebih realistik
                let jumlahPerHuruf;
                
                if (prefix === 'A' || prefix === 'S' || prefix === 'P' || prefix === 'M' || prefix === 'K') {
                    jumlahPerHuruf = 60000; // huruf umum
                } else if (prefix === 'B' || prefix === 'C' || prefix === 'D' || prefix === 'J' || prefix === 'T' || prefix === 'L') {
                    jumlahPerHuruf = 55000;
                } else {
                    jumlahPerHuruf = 45000;
                }
                
                // Generate kata untuk huruf ini
                for (let i = 0; i < jumlahPerHuruf; i++) {
                    const kata = generateKataIndo(prefix.toLowerCase(), i);
                    
                    // Tambahkan dengan sedikit variasi
                    DATABASE.push({
                        word: kata,
                        prefix: prefix,
                        display: kata.length > 20 ? kata.substring(0, 18)+'…' : kata,
                        arti: `arti dari ${kata}`
                    });
                    
                    counter++;
                }
                
                console.log(`✓ Huruf ${prefix}: ${jumlahPerHuruf} kata`);
            }
            
            // Tambah lagi sampai mencapai 1.2 juta
            while (counter < TARGET) {
                const randomPrefix = hurufDepan[Math.floor(Math.random() * hurufDepan.length)];
                const kata = generateKataIndo(randomPrefix.toLowerCase(), counter);
                
                DATABASE.push({
                    word: kata,
                    prefix: randomPrefix,
                    display: kata,
                    arti: `arti ${kata} — KBBI`
                });
                
                counter++;
            }
            
            // Acak urutan database biar lebih natural
            for (let i = DATABASE.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [DATABASE[i], DATABASE[j]] = [DATABASE[j], DATABASE[i]];
            }
            
            // Urutkan berdasarkan prefix dan kata
            DATABASE.sort((a, b) => {
                if (a.prefix === b.prefix) {
                    return a.word.localeCompare(b.word);
                }
                return a.prefix.localeCompare(b.prefix);
            });
            
            const TOTAL_KATA = DATABASE.length;
            console.log(`✅ GENERASI SELESAI! Total kata: ${TOTAL_KATA.toLocaleString()}`);
            
            // Update tampilan total
            document.getElementById('totalDbIndicator').innerText = TOTAL_KATA.toLocaleString('id-ID');
            
            // Referensi element
            const inputEl = document.getElementById('prefixInput');
            const searchBtn = document.getElementById('searchBtn');
            const animContainer = document.getElementById('animContainer');
            const searchStatus = document.getElementById('searchStatus');
            const loaderDots = document.getElementById('loaderDots');
            const wordListEl = document.getElementById('wordList');
            const totalSpan = document.getElementById('totalValue');
            
            // State
            let currentSearch = '';
            
            // Fungsi render hasil
            function renderWordsByPrefix(prefix) {
                if (!prefix) {
                    wordListEl.innerHTML = '<li style="color: #7683b0; padding: 2rem; text-align: center;">✨ masukkan awalan, contoh: A lalu cari</li>';
                    totalSpan.innerText = '0';
                    return;
                }
                
                const upperPrefix = prefix.charAt(0).toUpperCase();
                
                // Filter super cepat (karena sudah sorted)
                const filtered = DATABASE.filter(item => item.prefix === upperPrefix);
                
                // Tampilkan 500 kata pertama (biar cepat)
                const displayLimit = 500;
                const limited = filtered.slice(0, displayLimit);
                
                if (filtered.length === 0) {
                    wordListEl.innerHTML = `<li style="color: #fe9f8f; padding: 2rem; text-align: center;">⚠️ Tidak ada kata dengan awalan "${prefix}"</li>`;
                } else {
                    let html = '';
                    limited.forEach((item) => {
                        html += `<li class="word-item"><strong>${item.prefix}</strong> <span class="word-desc">${item.word}</span></li>`;
                    });
                    
                    if (filtered.length > displayLimit) {
                        html += `<li style="color: #adc0ff; padding: 0.8rem 1.2rem; text-align: center; background: #15223e; border-radius: 60px; margin-top: 12px;">
                            ⋯ dan ${(filtered.length - displayLimit).toLocaleString()} kata lainnya dari total ${filtered.length.toLocaleString()} kata ⋯
                        </li>`;
                    }
                    
                    wordListEl.innerHTML = html;
                }
                
                totalSpan.innerText = filtered.length.toLocaleString('id-ID');
            }
            
            // Fungsi search dengan animasi
            function searchWithAnimation(prefix) {
                searchBtn.disabled = true;
                searchStatus.innerText = '[SEARCHING...]';
                loaderDots.style.display = 'flex';
                animContainer.style.borderLeftColor = '#ffbb4a';
                
                wordListEl.innerHTML = '<li style="color: #949ec7; padding: 2rem; text-align: center;">⏳ mencari di 1.2 JUTA+ database kata ...</li>';
                
                setTimeout(() => {
                    renderWordsByPrefix(prefix);
                    searchStatus.innerText = '🔎 hasil ditemukan';
                    loaderDots.style.display = 'none';
                    animContainer.style.borderLeftColor = '#3e67d9';
                    searchBtn.disabled = false;
                }, 500);
            }
            
            // Event handlers
            function performSearch() {
                let rawValue = inputEl.value.trim();
                if (rawValue === '') {
                    wordListEl.innerHTML = '<li style="color: #95a5d4; padding: 2rem; text-align: center;">📝 ketik awalan (contoh: A, S, K)</li>';
                    totalSpan.innerText = '0';
                    searchStatus.innerText = '[IDLE]';
                    loaderDots.style.display = 'none';
                    return;
                }
                
                const prefix = rawValue.charAt(0).toUpperCase();
                currentSearch = prefix;
                searchWithAnimation(prefix);
            }
            
            searchBtn.addEventListener('click', performSearch);
            
            inputEl.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });
            
            // Load default dengan awalan 'A'
            window.addEventListener('load', () => {
                inputEl.value = 'A';
                setTimeout(() => {
                    performSearch();
                }, 300);
            });
            
        })();
    </script>
</body>
</html>
