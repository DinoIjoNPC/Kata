<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORD FINDER · Kamus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            transition: background-color 0.2s;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .card {
            background: #111111;
            border-radius: 2.2rem;
            padding: 2rem 2rem 2.5rem;
            border: 1px solid #2a2a2a;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.02) inset;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .title h1 {
            color: #ffffff;
            font-size: 2.2rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .title p {
            color: #7e7e7e;
            font-size: 0.9rem;
            margin-top: 0.2rem;
            font-weight: 300;
        }

        .stats-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            background: #1a1a1a;
            border-radius: 3rem;
            padding: 0.6rem 1.5rem;
            border: 1px solid #2e2e2e;
        }

        .total-kata {
            color: #ffffff;
            font-weight: 500;
            background: #2a2a2a;
            padding: 0.3rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.95rem;
            border: 1px solid #4a4a4a;
        }

        .credit {
            color: #b5b5b5;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .credit a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            background: #2d2d2d;
            padding: 0.2rem 1rem;
            border-radius: 2rem;
            border: 1px solid #4a4a4a;
            transition: 0.15s;
        }

        .credit a:hover {
            background: #3d3d3d;
            border-color: #777;
        }

        .theme-switch {
            background: #1d1d1d;
            border-radius: 40px;
            padding: 0.3rem;
            border: 1px solid #333;
            display: flex;
            gap: 0.2rem;
        }

        .theme-option {
            background: transparent;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #aaa;
            cursor: pointer;
            transition: 0.15s;
        }

        .theme-option.active {
            background: #ffffff;
            color: #000000;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(255,255,255,0.2);
        }

        .search-area {
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            align-items: center;
            background: #1a1a1a;
            border-radius: 60px;
            border: 1px solid #2e2e2e;
            padding: 0.2rem 0.2rem 0.2rem 1.8rem;
            transition: 0.15s;
        }

        .input-group:focus-within {
            border-color: #777;
            background: #202020;
        }

        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem 0.5rem 1rem 0;
            font-size: 1.2rem;
            color: #ffffff;
            outline: none;
        }

        .input-group input::placeholder {
            color: #555;
            font-weight: 300;
            font-size: 1rem;
        }

        .input-group button {
            background: #ffffff;
            border: none;
            border-radius: 60px;
            padding: 0.9rem 2.2rem;
            font-weight: 600;
            font-size: 1rem;
            color: #000000;
            cursor: pointer;
            transition: 0.15s;
            white-space: nowrap;
            border: 1px solid transparent;
        }

        .input-group button:hover {
            background: #e0e0e0;
            transform: scale(0.98);
        }

        .loading-container {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin: 1rem 0 0.5rem 0;
            color: #b5b5b5;
            font-weight: 400;
            padding-left: 0.3rem;
        }

        .loader {
            width: 22px;
            height: 22px;
            border: 2px solid #3a3a3a;
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        .result-section {
            margin-top: 2rem;
            border-top: 1px solid #2a2a2a;
            padding-top: 1.8rem;
        }

        .list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }

        .list-header h3 {
            color: #dddddd;
            font-weight: 400;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge {
            background: #232323;
            color: #b0b0b0;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
            border: 1px solid #3a3a3a;
        }

        .btn-research {
            background: transparent;
            border: 1px solid #4a4a4a;
            padding: 0.6rem 1.8rem;
            border-radius: 40px;
            font-weight: 500;
            color: #dddddd;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .btn-research:hover {
            background: #2a2a2a;
            color: #ffffff;
            border-color: #777;
        }

        .word-list {
            list-style: none;
            background: #0c0c0c;
            border-radius: 1.8rem;
            padding: 1.8rem 2rem;
            max-height: 380px;
            overflow-y: auto;
            border: 1px solid #2a2a2a;
            margin-bottom: 1rem;
            scrollbar-width: thin;
            scrollbar-color: #555 #1a1a1a;
        }

        .word-list::-webkit-scrollbar {
            width: 6px;
        }
        .word-list::-webkit-scrollbar-track {
            background: #1a1a1a;
            border-radius: 10px;
        }
        .word-list::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 10px;
        }

        .word-list li {
            color: #eaeaea;
            padding: 0.7rem 0.5rem;
            border-bottom: 1px solid #262626;
            font-size: 1.1rem;
            font-weight: 300;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .word-list li::before {
            content: counter(item) ". ";
            counter-increment: item;
            color: #888;
            font-weight: 400;
            min-width: 2.5rem;
        }

        .word-list {
            counter-reset: item;
        }

        .word-list li:last-child {
            border-bottom: none;
        }

        body.white-theme {
            background: #f0f0f0;
        }
        body.white-theme .card {
            background: #ffffff;
            border-color: #d0d0d0;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.15);
        }
        body.white-theme .title h1 {
            color: #111111;
        }
        body.white-theme .title p {
            color: #555;
        }
        body.white-theme .stats-row {
            background: #e9e9e9;
            border-color: #ccc;
        }
        body.white-theme .total-kata {
            background: #dddddd;
            color: #222;
            border-color: #aaa;
        }
        body.white-theme .credit {
            color: #444;
        }
        body.white-theme .credit a {
            background: #e0e0e0;
            color: #111;
            border-color: #aaa;
        }
        body.white-theme .input-group {
            background: #f2f2f2;
            border-color: #ccc;
        }
        body.white-theme .input-group input {
            color: #111;
        }
        body.white-theme .input-group input::placeholder {
            color: #aaa;
        }
        body.white-theme .input-group button {
            background: #111;
            color: #ffffff;
        }
        body.white-theme .input-group button:hover {
            background: #2a2a2a;
        }
        body.white-theme .loader {
            border: 2px solid #bbb;
            border-top: 2px solid #222;
        }
        body.white-theme .loading-container {
            color: #444;
        }
        body.white-theme .list-header h3 {
            color: #333;
        }
        body.white-theme .badge {
            background: #ececec;
            border-color: #aaa;
            color: #333;
        }
        body.white-theme .btn-research {
            border-color: #aaa;
            color: #333;
        }
        body.white-theme .btn-research:hover {
            background: #dddddd;
            color: #000;
        }
        body.white-theme .word-list {
            background: #f9f9f9;
            border-color: #ccc;
        }
        body.white-theme .word-list li {
            color: #222;
            border-bottom-color: #d0d0d0;
        }
        body.white-theme .word-list li::before {
            color: #777;
        }
        body.white-theme .theme-option.active {
            background: #111;
            color: white;
            box-shadow: none;
        }
        body.white-theme .theme-option {
            color: #666;
        }
        body.white-theme .theme-switch {
            background: #e6e6e6;
            border-color: #aaa;
        }
    </style>
</head>

    <div class="container">
        <div class="card">
            <div class="header">
                <div class="title">
                    <h1>WORD FINDER</h1>
                    <p>kamus super lengkap · ribuan kata</p>

            <div class="search-area">

                <div style="display: flex; justify-content: flex-end; margin-top: 1.2rem;">
                    <button class="btn-research" id="researchBtn">
                        <span>⟲</span> ReSearch · Cari Lain
                    </button>
                </div>
            </div>
        </div>
    </div>

            // elemen DOM
            const awalanInput = document.getElementById('awalanInput');
            const searchBtn = document.getElementById('searchBtn');
            const loadingAnim = document.getElementById('loadingAnim');
            const wordListEl = document.getElementById('wordList');
            const countBadge = document.getElementById('countBadge');
            const listTitle = document.getElementById('listTitle');
            const researchBtn = document.getElementById('researchBtn');
            const totalKataDisplay = document.getElementById('totalKataDisplay');
            const themeDark = document.getElementById('theme-dark');
            const themeLight = document.getElementById('theme-light');
            const body = document.body;

            // Tampilkan total kata
            totalKataDisplay.textContent = `Total Kata: ${wordDatabase.length.toLocaleString()}`;

            function searchByPrefix(prefix) {
                wordListEl.innerHTML = '';
                
                if (!prefix.trim()) {
                    countBadge.textContent = '0 kata';
                    wordListEl.innerHTML = '<li style="justify-content: center; color:#777; list-style:none; counter-increment: none;">⚠️ masukkan awalan</li>';
                    return;
                }

                loadingAnim.classList.remove('hidden');
                listTitle.textContent = `LIST KATA : awalan "${prefix.toUpperCase()}"`;

                setTimeout(() => {
                    const lowerPrefix = prefix.toLowerCase().trim();
                    const filtered = wordDatabase.filter(word => 
                        word.toLowerCase().startsWith(lowerPrefix)
                    ).sort((a,b) => a.localeCompare(b));

                    countBadge.textContent = filtered.length + ' kata';
                    wordListEl.innerHTML = '';

                    if (filtered.length === 0) {
                        const emptyMsg = document.createElement('li');
                        emptyMsg.textContent = `⛔ "${prefix}" tidak ditemukan di database`;
                        emptyMsg.style.cssText = 'justify-content: center; list-style:none; color:#888; counter-increment: none;';
                        wordListEl.appendChild(emptyMsg);
                    } else {
                        filtered.forEach(kata => {
                            const li = document.createElement('li');
                            li.textContent = kata;
                            wordListEl.appendChild(li);
                        });
                    }

                    loadingAnim.classList.add('hidden');
                }, 500);
            }

            function performSearch() {
                const prefix = awalanInput.value.trim();
                searchByPrefix(prefix);
            }

            searchBtn.addEventListener('click', performSearch);
            awalanInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') performSearch();
            });

            researchBtn.addEventListener('click', () => {
                awalanInput.value = '';
                awalanInput.focus();
                wordListEl.innerHTML = '<li style="justify-content: center; color:#777; list-style:none; counter-increment: none;">✨ masukkan awalan</li>';
                countBadge.textContent = '0 kata';
                listTitle.textContent = 'LIST KATA🔎 :';
                loadingAnim.classList.add('hidden');
            });

            themeDark.addEventListener('click', () => {
                body.classList.remove('white-theme');
                themeDark.classList.add('active');
                themeLight.classList.remove('active');
            });

            themeLight.addEventListener('click', () => {
                body.classList.add('white-theme');
                themeLight.classList.add('active');
                themeDark.classList.remove('active');
            });
        })();
