<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORD FINDER · pencarian awalan + multi web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            transition: background-color 0.2s;
        }

        .container {
            width: 100%;
            max-width: 880px;
        }

        .card {
            background: #111111;
            border-radius: 2.2rem;
            padding: 2rem 2rem 2.5rem;
            border: 1px solid #2a2a2a;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.02) inset;
        }

        /* header dengan title + toggle hitam/putih */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .title h1 {
            color: #ffffff;
            font-size: 2.2rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .title p {
            color: #7e7e7e;
            font-size: 0.9rem;
            margin-top: 0.2rem;
            font-weight: 300;
        }

        /* toggle tombol tema hitam / putih */
        .theme-switch {
            background: #1d1d1d;
            border-radius: 40px;
            padding: 0.3rem;
            border: 1px solid #333;
            display: flex;
            gap: 0.2rem;
        }

        .theme-option {
            background: transparent;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #aaa;
            cursor: pointer;
            transition: 0.15s;
        }

        .theme-option.active {
            background: #ffffff;
            color: #000000;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(255,255,255,0.2);
        }

        /* area input */
        .search-area {
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            align-items: center;
            background: #1a1a1a;
            border-radius: 60px;
            border: 1px solid #2e2e2e;
            padding: 0.2rem 0.2rem 0.2rem 1.8rem;
            transition: 0.15s;
        }

        .input-group:focus-within {
            border-color: #777;
            background: #202020;
        }

        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem 0.5rem 1rem 0;
            font-size: 1.2rem;
            color: #ffffff;
            outline: none;
        }

        .input-group input::placeholder {
            color: #555;
            font-weight: 300;
            font-size: 1rem;
        }

        .input-group button {
            background: #ffffff;
            border: none;
            border-radius: 60px;
            padding: 0.9rem 2.2rem;
            font-weight: 600;
            font-size: 1rem;
            color: #000000;
            cursor: pointer;
            transition: 0.15s;
            white-space: nowrap;
            border: 1px solid transparent;
        }

        .input-group button:hover {
            background: #e0e0e0;
            transform: scale(0.98);
        }

        /* animasi searching */
        .loading-container {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin: 1rem 0 0.5rem 0;
            color: #b5b5b5;
            font-weight: 400;
            padding-left: 0.3rem;
        }

        .loader {
            width: 22px;
            height: 22px;
            border: 2px solid #3a3a3a;
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        /* list hasil + tombol research */
        .result-section {
            margin-top: 2rem;
            border-top: 1px solid #2a2a2a;
            padding-top: 1.8rem;
        }

        .list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }

        .list-header h3 {
            color: #dddddd;
            font-weight: 400;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge {
            background: #232323;
            color: #b0b0b0;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
            border: 1px solid #3a3a3a;
        }

        .btn-research {
            background: transparent;
            border: 1px solid #4a4a4a;
            padding: 0.6rem 1.8rem;
            border-radius: 40px;
            font-weight: 500;
            color: #dddddd;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .btn-research:hover {
            background: #2a2a2a;
            color: #ffffff;
            border-color: #777;
        }

        .word-list {
            list-style: none;
            background: #0c0c0c;
            border-radius: 1.8rem;
            padding: 1.8rem 2rem;
            max-height: 380px;
            overflow-y: auto;
            border: 1px solid #2a2a2a;
            margin-bottom: 1rem;
            scrollbar-width: thin;
            scrollbar-color: #555 #1a1a1a;
        }

        .word-list::-webkit-scrollbar {
            width: 6px;
        }
        .word-list::-webkit-scrollbar-track {
            background: #1a1a1a;
            border-radius: 10px;
        }
        .word-list::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 10px;
        }

        .word-list li {
            color: #eaeaea;
            padding: 0.7rem 0.5rem;
            border-bottom: 1px solid #262626;
            font-size: 1.1rem;
            font-weight: 300;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .word-list li::before {
            content: "•";
            color: #777;
            font-weight: 400;
            font-size: 1.4rem;
        }

        .word-list li:last-child {
            border-bottom: none;
        }

        .info-empty {
            color: #777;
            font-style: italic;
            padding: 1.5rem;
            text-align: center;
            background: #0c0c0c;
            border-radius: 2rem;
            border: 1px solid #262626;
        }

        /* tema putih (toggle) */
        body.white-theme {
            background: #f0f0f0;
        }
        body.white-theme .card {
            background: #ffffff;
            border-color: #d0d0d0;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.15);
        }
        body.white-theme .title h1 {
            color: #111111;
        }
        body.white-theme .title p {
            color: #555;
        }
        body.white-theme .input-group {
            background: #f2f2f2;
            border-color: #ccc;
        }
        body.white-theme .input-group input {
            color: #111;
        }
        body.white-theme .input-group input::placeholder {
            color: #aaa;
        }
        body.white-theme .input-group button {
            background: #111;
            color: #ffffff;
        }
        body.white-theme .input-group button:hover {
            background: #2a2a2a;
        }
        body.white-theme .loader {
            border: 2px solid #bbb;
            border-top: 2px solid #222;
        }
        body.white-theme .loading-container {
            color: #444;
        }
        body.white-theme .list-header h3 {
            color: #333;
        }
        body.white-theme .badge {
            background: #ececec;
            border-color: #aaa;
            color: #333;
        }
        body.white-theme .btn-research {
            border-color: #aaa;
            color: #333;
        }
        body.white-theme .btn-research:hover {
            background: #dddddd;
            color: #000;
        }
        body.white-theme .word-list {
            background: #f9f9f9;
            border-color: #ccc;
        }
        body.white-theme .word-list li {
            color: #222;
            border-bottom-color: #d0d0d0;
        }
        body.white-theme .word-list li::before {
            color: #999;
        }
        body.white-theme .info-empty {
            background: #f9f9f9;
            border-color: #ccc;
            color: #777;
        }
        body.white-theme .theme-option.active {
            background: #111;
            color: white;
            box-shadow: none;
        }
        body.white-theme .theme-option {
            color: #666;
        }
        body.white-theme .theme-switch {
            background: #e6e6e6;
            border-color: #aaa;
        }

        /* panel tambahan untuk multi web search */
        .multiweb-panel {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
            padding: 0.8rem 0;
        }

        .web-badge {
            background: #1e1e1e;
            border: 1px solid #3a3a3a;
            border-radius: 40px;
            padding: 0.5rem 1.5rem;
            font-size: 0.9rem;
            color: #ccc;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .web-badge.google {
            background: #1a2a3a;
            border-color: #3b5a7a;
        }
        .web-badge.bing {
            background: #1a3a3a;
            border-color: #2a6a6a;
        }
        .web-badge.amazon {
            background: #3a2a1a;
            border-color: #c45500;
        }
        .web-badge.wikipedia {
            background: #2a2a2a;
            border-color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- header dengan title dan toggle hitam/putih -->
            <div class="header">
                <div class="title">
                    <h1>WORD FINDER</h1>
                    <p>cari jutaan kata · multi web search</p>
                </div>
                <div class="theme-switch">
                    <button class="theme-option active" id="theme-dark">Hitam</button>
                    <button class="theme-option" id="theme-light">Putih</button>
                </div>
            </div>

            <!-- panel pencarian -->
            <div class="search-area">
                <div class="input-group">
                    <input type="text" id="awalanInput" placeholder="Masukkan awalan kata, contoh: A, B, me..." autocomplete="off">
                    <button id="searchBtn">Search</button>
                </div>
                <!-- animasi loading muncul saat search -->
                <div id="loadingAnim" class="loading-container hidden">
                    <div class="loader"></div>
                    <span>SEARCHING ...</span>
                </div>
                
                <!-- badge info multi web search -->
                <div class="multiweb-panel">
                    <span class="web-badge google">🌐 Google</span>
                    <span class="web-badge bing">🔍 Bing</span>
                    <span class="web-badge amazon">📦 Amazon</span>
                    <span class="web-badge wikipedia">📚 Wikipedia</span>
                    <span style="color:#777; font-size:0.9rem; margin-left:auto;">akan buka 4 tab sekaligus</span>
                </div>
            </div>

            <!-- area hasil + LIST + tombol ReSearch -->
            <div class="result-section" id="resultSection">
                <div class="list-header">
                    <h3 id="listTitle">LIST :</h3>
                    <span class="badge" id="countBadge">0 kata</span>
                </div>

                <!-- container list kata -->
                <div id="wordListContainer">
                    <ul class="word-list" id="wordList">
                        <!-- akan diisi javascript -->
                    </ul>
                </div>

                <!-- tombol research (mencari kata lain) -->
                <div style="display: flex; justify-content: flex-end; margin-top: 1.2rem;">
                    <button class="btn-research" id="researchBtn">
                        <span>⟲</span> ReSearch · Cari Lain
                    </button>
                </div>
            </div>
        </div>
    </div>

            // elemen DOM
            const awalanInput = document.getElementById('awalanInput');
            const searchBtn = document.getElementById('searchBtn');
            const loadingAnim = document.getElementById('loadingAnim');
            const wordListEl = document.getElementById('wordList');
            const countBadge = document.getElementById('countBadge');
            const listTitle = document.getElementById('listTitle');
            const researchBtn = document.getElementById('researchBtn');
            const themeDark = document.getElementById('theme-dark');
            const themeLight = document.getElementById('theme-light');
            const body = document.body;

            // state
            let currentPrefix = '';

            // Fungsi untuk membuka multi web search
            function openMultiWebSearch(query) {
                if (!query.trim()) return;
                
                const encodedQuery = encodeURIComponent(query.trim());
                
                // Daftar URL pencarian ke 4 website (Google, Bing, Amazon, Wikipedia)
                const searchUrls = [
                    `https://www.google.com/search?q=${encodedQuery}`,
                    `https://www.bing.com/search?q=${encodedQuery}`,
                    `https://www.amazon.com/s?k=${encodedQuery}`,
                    `https://id.wikipedia.org/wiki/Special:Search?search=${encodedQuery}`
                ];
                
                // Buka semua dalam tab baru (dengan sedikit jeda biar gak dianggap popup)
                searchUrls.forEach((url, index) => {
                    setTimeout(() => {
                        window.open(url, '_blank');
                    }, index * 200); // jeda 200ms antar tab
                });
            }

            // ----- fungsi pencarian (simulasi loading + tampil list) -----
            function searchByPrefix(prefix) {
                // bersihkan list
                wordListEl.innerHTML = '';
                if (!prefix.trim()) {
                    countBadge.textContent = '0 kata';
                    wordListEl.innerHTML = '<li style="justify-content: center; color:#777; list-style:none;">⚠️ masukkan awalan</li>';
                    return;
                }

                // tampilkan loading
                loadingAnim.classList.remove('hidden');
                listTitle.textContent = `LIST : awalan "${prefix.toUpperCase()}"`;

                // simulasi proses async (seperti fetching online)
                setTimeout(() => {
                    // filter kata berdasarkan awalan (case insensitive)
                    const lowerPrefix = prefix.toLowerCase().trim();
                    const filtered = wordDatabase.filter(word => 
                        word.toLowerCase().startsWith(lowerPrefix)
                    ).sort((a,b) => a.localeCompare(b));

                    // update badge
                    countBadge.textContent = filtered.length + ' kata';

                    // kosongkan list
                    wordListEl.innerHTML = '';

                    if (filtered.length === 0) {
                        // tampilkan pesan kosong
                        const emptyMsg = document.createElement('li');
                        emptyMsg.textContent = '⛔ tidak ditemukan';
                        emptyMsg.style.cssText = 'justify-content: center; list-style:none; color:#888;';
                        wordListEl.appendChild(emptyMsg);
                    } else {
                        // render semua kata
                        filtered.forEach(kata => {
                            const li = document.createElement('li');
                            li.textContent = kata;
                            wordListEl.appendChild(li);
                        });
                    }

                    // sembunyikan loading setelah selesai
                    loadingAnim.classList.add('hidden');
                }, 500); // delay 500ms biar kelihatan animasinya
            }

            // event search utama + multi web search
            function performSearch() {
                const prefix = awalanInput.value.trim();
                currentPrefix = prefix;
                
                // 1. Tampilkan list kata dari database lokal
                searchByPrefix(prefix);
                
                // 2. Buka multi web search (Google, Bing, Amazon, Wikipedia)
                if (prefix) {
                    openMultiWebSearch(prefix);
                }
            }

            searchBtn.addEventListener('click', performSearch);

            awalanInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });

            // tombol research: reset input & hasil, fokus ke input
            researchBtn.addEventListener('click', () => {
                awalanInput.value = '';
                awalanInput.focus();
                wordListEl.innerHTML = ''; 
                countBadge.textContent = '0 kata';
                listTitle.textContent = 'LIST :';
                loadingAnim.classList.add('hidden'); // matikan loading jika aktif
                
                // reset list ke pesan awal
                wordListEl.innerHTML = '<li style="justify-content: center; color:#777; list-style:none;">✨ masukkan awalan, klik search</li>';
            });

            // toggle tema hitam / putih
            themeDark.addEventListener('click', () => {
                body.classList.remove('white-theme');
                themeDark.classList.add('active');
                themeLight.classList.remove('active');
            });

            themeLight.addEventListener('click', () => {
                body.classList.add('white-theme');
                themeLight.classList.add('active');
                themeDark.classList.remove('active');
            });

            // inisialisasi default: list kosong dengan pesan awal
            wordListEl.innerHTML = '<li style="justify-content: center; color:#777; list-style:none;">✨ masukkan awalan, klik search</li>';
            countBadge.textContent = '0 kata';
        })();
